        const merge = function(nums1, m, nums2, n) {
            const temp = [];

            for(let i = 0, j = 0, k = 0; i < n + m; i++) {
                if(nums1[j] <= nums2[k] && j < m) {
                    temp[i] = nums1[j++];
                } else {
                    temp[i] = nums2[k++];
                }
            }

            nums1 = temp;
